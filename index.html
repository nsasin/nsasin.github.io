<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Losowanie nazwisk</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --accent: #f0c040;
      --accent2: #e05a5a;
      --text: #f0eee8;
      --muted: #7a7a90;
      --border: #2e2e3e;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 20px;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .result-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 500px;
      text-align: center;
      margin-bottom: 20px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .result-name {
      font-family: 'Syne', sans-serif;
      font-size: 2.6rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -1px;
      transition: all 0.3s;
    }

    .result-sub {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 20px;
    }

    button {
      font-family: 'DM Sans', sans-serif;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 12px 20px;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #111;
      flex: 2;
      font-weight: 700;
      font-size: 1rem;
    }
    .btn-primary:hover { background: #ffd060; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      flex: 1;
    }
    .btn-secondary:hover { color: var(--text); border-color: var(--muted); }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn-add {
      background: var(--accent);
      color: #111;
      font-weight: 700;
      padding: 10px 18px;
      border-radius: var(--radius);
      white-space: nowrap;
    }
    .btn-add:hover { background: #ffd060; }

    .name-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .name-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      transition: all 0.2s;
    }

    .name-item.excluded {
      opacity: 0.45;
      border-style: dashed;
    }

    .name-item.is-next {
      border-color: var(--accent);
      background: rgba(240,192,64,0.07);
    }

    .name-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      color: #111;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .name-item.excluded .name-avatar {
      background: var(--surface);
      color: var(--muted);
    }

    .name-label { flex: 1; font-size: 0.95rem; }

    .badge {
      font-size: 0.7rem;
      border-radius: 4px;
      padding: 2px 6px;
      font-weight: 500;
    }
    .badge-next { background: rgba(240,192,64,0.15); color: var(--accent); }
    .badge-done { background: rgba(122,122,144,0.15); color: var(--muted); }
    .badge-excl { background: rgba(224,90,90,0.12); color: var(--accent2); }

    .btn-icon {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1rem;
      padding: 4px 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
    }
    .btn-icon:hover { background: var(--surface); color: var(--text); }
    .btn-icon.danger:hover { color: var(--accent2); }

    .empty-msg {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 16px 0;
    }

    .error-shake {
      animation: shake 0.4s ease;
      border-color: var(--accent2) !important;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .flash { animation: flash 0.4s ease; }
    @keyframes flash {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <h1>Losowanie</h1>
  <p class="subtitle">Kolejność liniowa · bez powtórzeń</p>

  <div class="result-box">
    <div class="result-name" id="result-name">—</div>
    <div class="result-sub" id="result-sub">Naciśnij „Wylosuj" aby rozpocząć</div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="drawName()">▶ Wylosuj</button>
    <button class="btn-secondary" onclick="resetDrawing()">↺ Resetuj</button>
  </div>

  <div class="card">
    <div class="card-title">Lista uczestników</div>

    <div class="input-row">
      <input type="text" id="new-name" placeholder="Wpisz nowe imię…" onkeydown="if(event.key==='Enter') addName()">
      <button class="btn-add" onclick="addName()">+ Dodaj</button>
    </div>

    <div class="name-list" id="name-list"></div>
  </div>

  <script>
    const DEFAULT_NAMES = ['Norbert', 'Artur', 'Piotr', 'Andrzej'];

    function load() {
      return {
        names:      JSON.parse(localStorage.getItem('ln_names'))    || [...DEFAULT_NAMES],
        excluded:   JSON.parse(localStorage.getItem('ln_excluded')) || [],
        index:      parseInt(localStorage.getItem('ln_index'))      || 0,
        drawn:      parseInt(localStorage.getItem('ln_drawn'))      || 0
      };
    }

    function save() {
      localStorage.setItem('ln_names',    JSON.stringify(s.names));
      localStorage.setItem('ln_excluded', JSON.stringify(s.excluded));
      localStorage.setItem('ln_index',    s.index);
      localStorage.setItem('ln_drawn',    s.drawn);
    }

    let s = load();

    function active() {
      return s.names.filter(n => !s.excluded.includes(n));
    }

    // Znajdź kolejny nieykluczony indeks startując od fromIdx
    function nextIdx(fromIdx) {
      if (s.names.length === 0) return -1;
      for (let i = 0; i < s.names.length; i++) {
        const idx = (fromIdx + i) % s.names.length;
        if (!s.excluded.includes(s.names[idx])) return idx;
      }
      return -1;
    }

    function drawName() {
      const act = active();
      if (act.length === 0) {
        document.getElementById('result-name').textContent = '—';
        document.getElementById('result-sub').textContent = 'Brak aktywnych uczestników!';
        return;
      }

      if (s.drawn >= act.length) {
        s.drawn = 0;
        s.index = nextIdx(0);
        save();
        document.getElementById('result-name').textContent = '↺';
        document.getElementById('result-sub').textContent = 'Wszyscy byli! Zaczynamy od nowa…';
        renderList();
        setTimeout(drawName, 1200);
        return;
      }

      const idx = nextIdx(s.index);
      if (idx === -1) return;

      const drawn = s.names[idx];
      s.index = (idx + 1) % s.names.length;
      s.drawn++;
      save();

      const nameEl = document.getElementById('result-name');
      nameEl.textContent = drawn;
      nameEl.classList.remove('flash');
      void nameEl.offsetWidth;
      nameEl.classList.add('flash');

      const remaining = act.length - s.drawn;
      document.getElementById('result-sub').textContent =
        remaining > 0 ? `Pozostało w cyklu: ${remaining}` : 'Wszyscy zostali wylosowani';

      renderList();
    }

    function resetDrawing() {
      s.index = 0;
      s.drawn = 0;
      save();
      document.getElementById('result-name').textContent = '—';
      document.getElementById('result-sub').textContent = 'Naciśnij „Wylosuj" aby rozpocząć';
      renderList();
    }

    function addName() {
      const input = document.getElementById('new-name');
      const name = input.value.trim();
      if (!name) return;
      if (s.names.map(n=>n.toLowerCase()).includes(name.toLowerCase())) {
        input.classList.remove('error-shake');
        void input.offsetWidth;
        input.classList.add('error-shake');
        setTimeout(() => input.classList.remove('error-shake'), 500);
        return;
      }
      s.names.push(name);
      save();
      input.value = '';
      renderList();
    }

    function deleteName(name) {
      const wasIdx = s.names.indexOf(name);
      s.names = s.names.filter(n => n !== name);
      s.excluded = s.excluded.filter(n => n !== name);
      if (wasIdx < s.index) s.index = Math.max(0, s.index - 1);
      if (s.index >= s.names.length) s.index = 0;
      const act = active();
      if (s.drawn > act.length) s.drawn = act.length;
      save();
      renderList();
    }

    function toggleExclude(name) {
      if (s.excluded.includes(name)) {
        s.excluded = s.excluded.filter(n => n !== name);
      } else {
        s.excluded.push(name);
      }
      const act = active();
      if (s.drawn > act.length) s.drawn = act.length;
      save();
      renderList();
    }

    function renderList() {
      const list = document.getElementById('name-list');
      if (s.names.length === 0) {
        list.innerHTML = '<div class="empty-msg">Brak uczestników. Dodaj kogoś powyżej.</div>';
        return;
      }

      const act = active();
      const nxtIdx = nextIdx(s.index < s.names.length ? s.index : 0);
      const nxtName = nxtIdx !== -1 ? s.names[nxtIdx] : null;

      list.innerHTML = s.names.map(name => {
        const isExcl  = s.excluded.includes(name);
        const isNext  = name === nxtName && !isExcl && s.drawn < act.length;
        const actPos  = act.indexOf(name);
        const wasDone = !isExcl && actPos !== -1 && actPos < s.drawn;

        let badge = '';
        if (isExcl)        badge = '<span class="badge badge-excl">pominięty</span>';
        else if (isNext)   badge = '<span class="badge badge-next">następny</span>';
        else if (wasDone)  badge = '<span class="badge badge-done">✓ był</span>';

        const safe = name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

        return `
          <div class="name-item ${isExcl ? 'excluded' : ''} ${isNext ? 'is-next' : ''}">
            <div class="name-avatar">${name[0].toUpperCase()}</div>
            <span class="name-label">${name}</span>
            ${badge}
            <button class="btn-icon" title="${isExcl ? 'Włącz do losowania' : 'Wyklucz z losowania'}"
              onclick="toggleExclude('${safe}')">
              ${isExcl ? '👁' : '🚫'}
            </button>
            <button class="btn-icon danger" title="Usuń z listy"
              onclick="deleteName('${safe}')">✕</button>
          </div>`;
      }).join('');
    }

    renderList();
    if (s.drawn > 0) {
      const act = active();
      const remaining = act.length - s.drawn;
      document.getElementById('result-sub').textContent =
        remaining > 0 ? `Pozostało w cyklu: ${remaining}` : 'Wszyscy zostali wylosowani';
    }
  </script>

</body>
</html>
