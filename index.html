<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Losowanie nazwisk</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --accent: #f0c040;
      --accent2: #e05a5a;
      --text: #f0eee8;
      --muted: #7a7a90;
      --border: #2e2e3e;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 40px 16px;
    }
    h1 { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; color: var(--accent); margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 8px; }
    .sync-bar { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 500px; margin-bottom: 24px; font-size: 12px; color: var(--muted); }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 6px; transition: background 0.3s; }
    .sync-dot.saving { background: var(--accent); }
    .sync-dot.err    { background: var(--accent2); }
    .sync-dot.offline{ background: var(--muted); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 500px; margin-bottom: 20px; }
    .card-title { font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
    .result-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 500px; text-align: center; margin-bottom: 20px; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
    .result-name { font-family: 'Syne', sans-serif; font-size: 2.6rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; transition: all 0.3s; }
    .result-sub { font-size: 0.85rem; color: var(--muted); }
    .btn-row { display: flex; gap: 10px; width: 100%; max-width: 500px; margin-bottom: 20px; }
    button { font-family: 'DM Sans', sans-serif; border: none; border-radius: var(--radius); cursor: pointer; font-size: 0.95rem; font-weight: 500; padding: 12px 20px; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #111; flex: 2; font-weight: 700; font-size: 1rem; }
    .btn-primary:hover { background: #ffd060; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); flex: 1; }
    .btn-secondary:hover { color: var(--text); border-color: var(--muted); }
    .btn-danger { background: var(--surface2); color: var(--accent2); border: 1px solid var(--border); flex: 1; }
    .btn-danger:hover { border-color: var(--accent2); }
    .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
    input[type="text"] { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; padding: 10px 14px; outline: none; transition: border-color 0.2s; }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }
    .btn-add { background: var(--accent); color: #111; font-weight: 700; padding: 10px 18px; border-radius: var(--radius); white-space: nowrap; }
    .btn-add:hover { background: #ffd060; }
    .name-list { display: flex; flex-direction: column; gap: 8px; }
    .name-item { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; transition: all 0.2s; }
    .name-item.excluded { opacity: 0.45; border-style: dashed; }
    .name-item.is-next  { border-color: var(--accent); background: rgba(240,192,64,0.07); }
    .name-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: #111; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .name-item.excluded .name-avatar { background: var(--surface); color: var(--muted); }
    .name-label { flex: 1; font-size: 0.95rem; }
    .badge { font-size: 0.7rem; border-radius: 4px; padding: 2px 6px; font-weight: 500; }
    .badge-next { background: rgba(240,192,64,0.15); color: var(--accent); }
    .badge-done { background: rgba(122,122,144,0.15); color: var(--muted); }
    .badge-excl { background: rgba(224,90,90,0.12); color: var(--accent2); }
    .btn-icon { background: none; border: none; color: var(--muted); font-size: 1rem; padding: 4px 6px; border-radius: 6px; cursor: pointer; transition: all 0.15s; line-height: 1; }
    .btn-icon:hover { background: var(--surface); color: var(--text); }
    .btn-icon.danger:hover { color: var(--accent2); }
    .empty-msg { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 16px 0; }
    .history-list { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
    .history-item { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: var(--text); padding: 5px 0; border-bottom: 1px solid var(--border); }
    .history-item:last-child { border-bottom: none; }
    .history-meta { font-size: 0.75rem; color: var(--muted); }
    .error-shake { animation: shake 0.4s ease; border-color: var(--accent2) !important; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .flash { animation: flash 0.4s ease; }
    @keyframes flash { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <h1>Losowanie</h1>
  <p class="subtitle">Kolejność liniowa · bez powtórzeń</p>

  <div class="sync-bar">
    <span><span class="sync-dot offline" id="sync-dot"></span><span id="sync-status">Łączenie z bazą…</span></span>
    <span id="sync-time"></span>
  </div>

  <div class="result-box">
    <div class="result-name" id="result-name">—</div>
    <div class="result-sub" id="result-sub">Naciśnij „Wylosuj" aby rozpocząć</div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" id="btn-draw">▶ Wylosuj</button>
    <button class="btn-secondary" id="btn-reset">↺ Resetuj cykl</button>
    <button class="btn-danger" id="btn-clear">⊗ Wyczyść</button>
  </div>

  <div class="card">
    <div class="card-title">Lista uczestników</div>
    <div class="input-row">
      <input type="text" id="new-name" placeholder="Wpisz nowe imię…">
      <button class="btn-add" id="btn-add">+ Dodaj</button>
    </div>
    <div class="name-list" id="name-list"></div>
  </div>

  <div class="card">
    <div class="card-title">Historia losowania</div>
    <div class="history-list" id="history-list">
      <div class="empty-msg">Brak historii</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp }                    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, onValue }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const app   = initializeApp({ databaseURL: "https://asysty-default-rtdb.europe-west1.firebasedatabase.app" });
    const db    = getDatabase(app);
    const dbRef = ref(db, 'losowanie');

    const DEFAULT_NAMES = ['Norbert', 'Artur', 'Piotr', 'Andrzej'];
    let s = { names: [...DEFAULT_NAMES], excluded: [], index: 0, drawn: 0, cycle: 1, history: [] };
    let ignoreNext = false;

    /* ---- helpers ---- */
    function active() { return s.names.filter(n => !s.excluded.includes(n)); }

    function nextIdx(from) {
      if (!s.names.length) return -1;
      for (let i = 0; i < s.names.length; i++) {
        const idx = (from + i) % s.names.length;
        if (!s.excluded.includes(s.names[idx])) return idx;
      }
      return -1;
    }

    /* ---- sync status ---- */
    function setSyncStatus(state, label) {
      document.getElementById('sync-dot').className = 'sync-dot' + (state === 'err' ? ' err' : state === 'saving' ? ' saving' : state === 'offline' ? ' offline' : '');
      document.getElementById('sync-status').textContent = label;
      if (state === 'ok') document.getElementById('sync-time').textContent =
        new Date().toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    /* ---- persist ---- */
    function persist() {
      setSyncStatus('saving', 'Zapisywanie…');
      ignoreNext = true;
      set(dbRef, s)
        .then(() => setSyncStatus('ok', 'Zsynchronizowano'))
        .catch(() => setSyncStatus('err', 'Błąd zapisu'));
    }

    /* ---- listen for remote changes ---- */
    onValue(dbRef, snapshot => {
      if (ignoreNext) { ignoreNext = false; return; }
      const data = snapshot.val();
      if (data) {
        s = Object.assign({ names: [...DEFAULT_NAMES], excluded: [], index: 0, drawn: 0, cycle: 1, history: [] }, data);
        restoreResultDisplay();
        render();
      }
      setSyncStatus('ok', 'Zsynchronizowano');
    }, () => setSyncStatus('err', 'Błąd połączenia'));

    /* ---- actions ---- */
    function drawName() {
      const act = active();
      if (!act.length) {
        document.getElementById('result-name').textContent = '—';
        document.getElementById('result-sub').textContent = 'Brak aktywnych uczestników!';
        return;
      }
      if (s.drawn >= act.length) {
        s.drawn = 0; s.cycle++;
        s.index = nextIdx(0);
        persist();
        document.getElementById('result-name').textContent = '↺';
        document.getElementById('result-sub').textContent = 'Wszyscy byli! Zaczynamy od nowa…';
        render();
        setTimeout(drawName, 1200);
        return;
      }
      const idx = nextIdx(s.index);
      if (idx === -1) return;
      const drawn = s.names[idx];
      s.index = (idx + 1) % s.names.length;
      s.drawn++;
      s.history = s.history || [];
      s.history.unshift({ name: drawn, cycle: s.cycle, time: new Date().toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' }) });
      if (s.history.length > 60) s.history.pop();
      persist();

      const nameEl = document.getElementById('result-name');
      nameEl.textContent = drawn;
      nameEl.classList.remove('flash');
      void nameEl.offsetWidth;
      nameEl.classList.add('flash');

      const remaining = act.length - s.drawn;
      document.getElementById('result-sub').textContent =
        remaining > 0 ? `Pozostało w cyklu: ${remaining}` : 'Wszyscy zostali wylosowani';
      render();
    }

    function resetDrawing() {
      s.drawn = 0; s.index = 0; s.cycle++;
      persist();
      document.getElementById('result-name').textContent = '—';
      document.getElementById('result-sub').textContent = 'Cykl zresetowany – zaczynam od Norberta';
      render();
    }

    function clearMemory() {
      if (!confirm('Wyczyścić całą pamięć? (historia, lista, stan kolejki)')) return;
      s = { names: [...DEFAULT_NAMES], excluded: [], index: 0, drawn: 0, cycle: 1, history: [] };
      persist();
      document.getElementById('result-name').textContent = '—';
      document.getElementById('result-sub').textContent = 'Pamięć wyczyszczona';
      render();
    }

    function addName() {
      const input = document.getElementById('new-name');
      const name  = input.value.trim();
      if (!name) return;
      if (s.names.map(n => n.toLowerCase()).includes(name.toLowerCase())) {
        input.classList.remove('error-shake');
        void input.offsetWidth;
        input.classList.add('error-shake');
        setTimeout(() => input.classList.remove('error-shake'), 500);
        return;
      }
      s.names.push(name);
      persist(); input.value = ''; render();
    }

    function deleteName(name) {
      const wi = s.names.indexOf(name);
      s.names    = s.names.filter(n => n !== name);
      s.excluded = s.excluded.filter(n => n !== name);
      if (wi < s.index) s.index = Math.max(0, s.index - 1);
      if (s.index >= s.names.length) s.index = 0;
      if (s.drawn > active().length) s.drawn = active().length;
      persist(); render();
    }

    function toggleExclude(name) {
      if (s.excluded.includes(name)) s.excluded = s.excluded.filter(n => n !== name);
      else s.excluded.push(name);
      if (s.drawn > active().length) s.drawn = active().length;
      persist(); render();
    }

    /* ---- render ---- */
    function render() { renderList(); renderHistory(); }

    function renderList() {
      const list = document.getElementById('name-list');
      if (!s.names.length) { list.innerHTML = '<div class="empty-msg">Brak uczestników.</div>'; return; }
      const act = active();
      const ni  = nextIdx(s.index < s.names.length ? s.index : 0);
      const nxtName = ni !== -1 ? s.names[ni] : null;

      // czyść i buduj elementy przez DOM (bez onclick w stringu)
      list.innerHTML = '';
      s.names.forEach(name => {
        const isExcl  = s.excluded.includes(name);
        const isNext  = name === nxtName && !isExcl && s.drawn < act.length;
        const actPos  = act.indexOf(name);
        const wasDone = !isExcl && actPos !== -1 && actPos < s.drawn;

        const item = document.createElement('div');
        item.className = 'name-item' + (isExcl ? ' excluded' : '') + (isNext ? ' is-next' : '');

        const avatar = document.createElement('div');
        avatar.className = 'name-avatar';
        avatar.textContent = name[0].toUpperCase();

        const label = document.createElement('span');
        label.className = 'name-label';
        label.textContent = name;

        let badgeEl = null;
        if (isExcl || isNext || wasDone) {
          badgeEl = document.createElement('span');
          badgeEl.className = 'badge ' + (isExcl ? 'badge-excl' : isNext ? 'badge-next' : 'badge-done');
          badgeEl.textContent = isExcl ? 'pominięty' : isNext ? 'następny' : '✓ był';
        }

        const btnExcl = document.createElement('button');
        btnExcl.className = 'btn-icon';
        btnExcl.title = isExcl ? 'Włącz' : 'Wyklucz';
        btnExcl.textContent = isExcl ? '👁' : '🚫';
        btnExcl.addEventListener('click', () => toggleExclude(name));

        const btnDel = document.createElement('button');
        btnDel.className = 'btn-icon danger';
        btnDel.title = 'Usuń';
        btnDel.textContent = '✕';
        btnDel.addEventListener('click', () => deleteName(name));

        item.append(avatar, label);
        if (badgeEl) item.appendChild(badgeEl);
        item.append(btnExcl, btnDel);
        list.appendChild(item);
      });
    }

    function renderHistory() {
      const el = document.getElementById('history-list');
      if (!s.history || !s.history.length) { el.innerHTML = '<div class="empty-msg">Brak historii</div>'; return; }
      el.innerHTML = s.history.map(h => `
        <div class="history-item">
          <span>${h.name}</span>
          <span class="history-meta">Cykl ${h.cycle} · ${h.time}</span>
        </div>`).join('');
    }

    function restoreResultDisplay() {
      if (s.history && s.history.length > 0) {
        document.getElementById('result-name').textContent = s.history[0].name;
        const act = active();
        const remaining = act.length - s.drawn;
        document.getElementById('result-sub').textContent =
          remaining > 0 ? `Pozostało w cyklu: ${remaining}` : 'Wszyscy zostali wylosowani';
      }
    }

    /* ---- event listeners ---- */
    document.getElementById('btn-draw').addEventListener('click', drawName);
    document.getElementById('btn-reset').addEventListener('click', resetDrawing);
    document.getElementById('btn-clear').addEventListener('click', clearMemory);
    document.getElementById('btn-add').addEventListener('click', addName);
    document.getElementById('new-name').addEventListener('keydown', e => { if (e.key === 'Enter') addName(); });
  </script>

</body>
</html>
